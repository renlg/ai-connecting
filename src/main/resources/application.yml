server:
  port: 8080

spring:
  application:
    name: ai-connecting
  datasource:
    url: jdbc:sqlite:./data/ai-connecting.db
    driver-class-name: org.sqlite.JDBC
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
  jackson:
    default-property-inclusion: non_null
  data:
    redis:
      host: ${REDIS_HOST:r-bp1p6kzhgdqkv3td03pd.redis.rds.aliyuncs.com}
      port: ${REDIS_PORT:8188}
      username: ${REDIS_USERNAME:renlg_redis}
      password: ${REDIS_PASSWORD:uz2JnlFGQLtPue}
      database: ${REDIS_DATABASE:0}
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2

# 全链路追踪配置
management:
  tracing:
    enabled: true
    sampling:
      probability: 1.0  # 100% 采样率，生产环境可调低
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

app:
  rate-limit:
    enabled: true          # 限流功能开关（开启需要 Redis）
  jwt:
    secret: ${JWT_SECRET:ai-connecting-secret-key-change-this-in-production-2024}
    expiration: 86400000  # 24 hours in ms
  admin:
    default-password: ${ADMIN_DEFAULT_PASSWORD:hk0SRCOYTS7rGhkGV7aqrvqN}
    reset-password: ${ADMIN_RESET_PASSWORD:88888888}

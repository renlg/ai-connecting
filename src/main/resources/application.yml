server:
  port: 8080
  shutdown: graceful
  tomcat:
    max-http-form-post-size: 10MB
  servlet:
    multipart:
      max-request-size: 10MB

spring:
  application:
    name: ai-connecting
  lifecycle:
    timeout-per-shutdown-phase: 30s
  datasource:
    url: jdbc:sqlite:./data/ai-connecting.db?busy_timeout=5000
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 1
      connection-test-query: "SELECT 1"
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
  jackson:
    default-property-inclusion: non_null
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      username: ${REDIS_USERNAME:}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2

# 全链路追踪配置
management:
  tracing:
    enabled: true
    sampling:
      probability: 1.0  # 100% 采样率，生产环境可调低
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:}  # 逗号分隔的允许源，未配置时默认允许所有
  rate-limit:
    enabled: ${RATE_LIMIT_ENABLED:false}  # 限流功能开关（开启需要 Redis）
  jwt:
    secret: ${JWT_SECRET}  # 必须通过环境变量设置，不提供默认值
    expiration: 86400000  # 24 hours in ms
  admin:
    default-password: ${ADMIN_DEFAULT_PASSWORD}  # 必须通过环境变量设置
    reset-password: ${ADMIN_RESET_PASSWORD:}
